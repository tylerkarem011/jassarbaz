{% extends 'core/base.html' %}
{% block title %}Галерея - Jas Sarbaz{% endblock %}

{% block content %}
<div class="d-flex justify-content-between align-items-center mb-5">
    <h2><i class="fas fa-images"></i> Клуб Галереясы</h2>
</div>

<div class="row g-4">
    {% for img in images %}
    <div class="col-lg-3 col-md-4 col-sm-6">
        <div class="card h-100 shadow-sm border-0 overflow-hidden" 
             style="cursor: pointer;"
             onclick="openGallery({{ forloop.counter0 }})">
            
            <img src="{{ img.image.url }}" 
                 class="card-img-top w-100" 
                 style="height: 260px; object-fit: cover;"
                 alt="{{ img.title }}">
            
            <div class="card-body">
                <h6 class="mb-1">{{ img.title }}</h6>
                <small class="text-muted">{{ img.upload_date|date:"d.m.Y" }}</small>
            </div>
        </div>
    </div>
    {% endfor %}
</div>

<!-- Модалка -->
<div class="modal fade" id="galleryModal" tabindex="-1">
    <div class="modal-dialog modal-xl modal-dialog-centered">
        <div class="modal-content bg-transparent border-0">
            
            <!-- Крестик -->
            <button type="button" class="btn-close btn-close-white position-absolute top-0 end-0 m-4" 
                    style="z-index: 20; font-size: 2rem;" data-bs-dismiss="modal"></button>

            <!-- Стрелки (прозрачные) -->
            <button onclick="prevPhoto()" 
                    class="btn position-absolute top-50 start-0 translate-middle-y ms-3 p-0 border-0 bg-transparent"
                    style="z-index: 20; width: 60px; height: 60px;">
                <i class="fas fa-chevron-left fa-3x text-white" style="filter: drop-shadow(0 0 8px rgba(0,0,0,0.7));"></i>
            </button>
            
            <button onclick="nextPhoto()" 
                    class="btn position-absolute top-50 end-0 translate-middle-y me-3 p-0 border-0 bg-transparent"
                    style="z-index: 20; width: 60px; height: 60px;">
                <i class="fas fa-chevron-right fa-3x text-white" style="filter: drop-shadow(0 0 8px rgba(0,0,0,0.7));"></i>
            </button>

            <div class="modal-body p-0 text-center">
                <img id="modalBigImage" src="" class="img-fluid rounded-3" style="max-height: 90vh; width: auto;">
            </div>
        </div>
    </div>
</div>

<script>
let currentIndex = 0;
const galleryImages = [
    {% for img in images %}
    {
        src: "{{ img.image.url }}",
        title: "{{ img.title|escapejs }}"
    }{% if not forloop.last %},{% endif %}
    {% endfor %}
];

function openGallery(index) {
    currentIndex = index;
    updateModal();
    const modal = new bootstrap.Modal(document.getElementById('galleryModal'));
    modal.show();
}

function updateModal() {
    const img = galleryImages[currentIndex];
    document.getElementById('modalBigImage').src = img.src;
}

function nextPhoto() {
    currentIndex = (currentIndex + 1) % galleryImages.length;
    updateModal();
}

function prevPhoto() {
    currentIndex = (currentIndex - 1 + galleryImages.length) % galleryImages.length;
    updateModal();
}
</script>

{% endblock %}
